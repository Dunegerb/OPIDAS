<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlefield - OPIDAS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles/profile-widget.css">
    <link rel="stylesheet" href="assets/styles/identity-modal.css">
    <link rel="stylesheet" href="assets/styles/base.css">
    <link rel="stylesheet" href="assets/styles/campo.css">
    <link rel="stylesheet" href="assets/styles/loading-screen.css">
	<link rel="icon" href="assets/styles/images/icones/flaticon.png" type="image/png">

	<!-- Preloader CSS -->
    <link rel="stylesheet" href="preloader.css">
</head>
<body>
	<!-- Preloader Container -->
	<div id="preloader" class="preloader">
	    <div class="preloader-content">
	        <video 
	            class="preloader-video" 
	            autoplay 
	            loop 
	            muted 
	            playsinline
	            poster="assets/motiondesigns/teladecarregamento/preloader_poster.jpg"
	        >
	            <source src="assets/motiondesigns/teladecarregamento/preloader_web.webm" type="video/webm">
	            <source src="assets/motiondesigns/teladecarregamento/preloader_webmp4.mp4" type="video/mp4">
	            Your browser does not support the video element.
	        </video>
	    </div>
	</div>
    <div class="app-container"> 
        <a href="doutrina.html"> 
            <img class="opidas-logo-center" alt="Opidas logo" src="assets/styles/images/opidaslogoouroboros.png" style="cursor: pointer;"> </a>
        
        <header class="top-bar">
            <div class="user-welcome">
                <img id="user-avatar" alt="Profile photo" src="https://github.com/Dunegerb/OPIDAS/raw/ba479afa9718cc1bd2b6a3d4e75d7b1bbe0da0f4/public/assets/styles/images/profile-card.png" />
                <div class="user-welcome-text">
                    <div class="greeting">Welcome back</div>
                    <div class="username" id="welcome-username">Loading...</div>
                </div>
            </div>

            <div class="status-bar">
                <div class="rank-icon" id="status-rank-icon-container">
                    <img id="status-rank-icon" alt="Rank" src="https://github.com/Dunegerb/OPIDAS/raw/ba479afa9718cc1bd2b6a3d4e75d7b1bbe0da0f4/public/assets/styles/images/patentes/Recruta.png" />
                </div>
                <div class="progress-info">
                    <p class="days" id="progress-days" style="position: static;">07<span>/10 Days</span></p>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" id="progress-bar-fill"></div>
                    </div>
                </div>
                <button class="icon-button">
                    <img alt="Notification button" src="https://github.com/Dunegerb/OPIDAS/raw/ba479afa9718cc1bd2b6a3d4e75d7b1bbe0da0f4/public/assets/styles/images/notifica%C3%A7%C3%A3obutton.svg" />
                </button>
                <button class="icon-button" id="logout-button">
                    <img alt="Logout" src="https://github.com/Dunegerb/OPIDAS/raw/ba479afa9718cc1bd2b6a3d4e75d7b1bbe0da0f4/public/assets/styles/images/darkmode-button.svg" />
                </button>
            </div>
        </header>

        <div class="main-content">
            <aside class="panel sidebar">
                <div class="sidebar-header">
                    <div class="title">
                        <div class="subtitle">Battlefield against</div>
                        <div class="main-title" id="habit-title">Loading...</div>
                    </div>
                    <img class="settings-icon" alt="Battlefield settings" src="assets/styles/images/icones/configcampo.svg" />
                </div>

                <nav class="sidebar-tabs">
                    <button class="tab-button active">Ranks</button>
                    <button class="tab-button">Admin</button>
                </nav>
                
                <ul class="ranks-list" id="ranks-list">
                    <!-- Ranks list will be rendered by JS -->
                </ul>

                <div class="sidebar-footer">
                    <p class="reset-info" id="reset-info">Reset chances <span>...</span></p>
                    <button class="reset-button" id="reset-button">Reset count</button>
                </div>
            </aside>
            
            <main class="panel chat-area">
                <header class="chat-header">
                    <img alt="Opidas Chat Logo" src="https://github.com/Dunegerb/OPIDAS/raw/ba479afa9718cc1bd2b6a3d4e75d7b1bbe0da0f4/public/assets/styles/images/icones/logochatopidas.svg" style="width: 34px; height: 34px;">
                    <button class="icon-button">
                        <img alt="Group members" src="assets/styles/images/icones/pessoasdogrupobotão.svg">
                    </button>
                    <div class="search-bar">
                        <input type="search" placeholder="Search">
                        <img class="search-icon" alt="Search" src="assets/styles/images/icones/search-vector.svg">
                    </div>
                    <button class="icon-button">
                        <img alt="Fullscreen" src="assets/styles/images/icones/botãofullscreenchat.svg">
                    </button>
                </header>

                <div class="messages-container" id="messages-container">
                    <!-- Messages will be loaded dynamically -->
                </div>

                <div class="chat-input-wrapper">
                    <form class="chat-input" id="chat-form">
                        <div class="input-field-container">
                            <button type="button"><img src="https://github.com/Dunegerb/OPIDAS/raw/ba479afa9718cc1bd2b6a3d4e75d7b1bbe0da0f4/public/assets/styles/images/icones/uploadbutton.svg" alt="Upload"></button>
                            <input type="text" id="chat-input-field" placeholder="Chat with the battlefield">
                            <button type="button"><img src="https://github.com/Dunegerb/OPIDAS/raw/ba479afa9718cc1bd2b6a3d4e75d7b1bbe0da0f4/public/assets/styles/images/icones/sendemojibutton.svg" alt="Emoji"></button>
                        </div>
                        <button class="mic-button" type="button">
                            <img alt="Record voice" src="https://github.com/Dunegerb/OPIDAS/raw/ba479afa9718cc1bd2b6a3d4e75d7b1bbe0da0f4/public/assets/styles/images/icones/voicebutton.svg">
                        </button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- Project Scripts -->
    <script src="/js/lib/logger.js"></script>
    <script src="/js/components/toast.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/lib/supabase-config.js"></script>
    <script src="js/components/loading-screen.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/services/user.js"></script>
    <script src="js/services/chat.js"></script>
    <script src="js/app.js"></script>
    <script src="js/components/identity-modal.js"></script>
    <script src="js/components/profile-widget.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // --- APPLICATION STATE ---
            const state = {
                currentUser: null,
                activeChannel: null,
                allUsers: [], // User cache to avoid repeated searches
                channels: [ // This will come from Supabase, but is mocked for now
                    { id: 'recruta', level: 0, name: 'Recruit', minDays: 0, maxDays: 9, icon: 'assets/styles/images/patentes/Recruta.png' },
                    { id: 'soldado', level: 1, name: 'Soldier', minDays: 10, maxDays: 29, icon: 'assets/styles/images/patentes/Soldado.png' },
                    { id: 'cabo',    level: 2, name: 'Corporal',    minDays: 30, maxDays: 59, icon: 'assets/styles/images/patentes/Cabo.png' },
                    { id: 'sargento',level: 3, name: 'Sergeant',minDays: 60, maxDays: 89, icon: 'assets/styles/images/patentes/Sargento.png' },
                    { id: 'marechal',level: 4, name: 'Marshal',minDays: 90, maxDays: 179, icon: 'assets/styles/images/patentes/Marechal.png' },
                    { id: 'tenente', level: 5, name: 'Lieutenant', minDays: 180, maxDays: 364, icon: 'assets/styles/images/patentes/Tenente.png' },
                    { id: 'capitao', level: 6, name: 'Captain', minDays: 365, maxDays: Infinity, icon: 'assets/styles/images/patentes/Capitão.png' }
                ]
            };

            // --- DOM ELEMENTS ---
            const welcomeUsernameEl = document.getElementById('welcome-username');
            const userAvatarEl = document.getElementById('user-avatar');
            const statusRankIconEl = document.getElementById('status-rank-icon');
            const progressDaysEl = document.getElementById('progress-days');
            const progressBarFillEl = document.getElementById('progress-bar-fill');
            const ranksListEl = document.getElementById('ranks-list');
            const resetInfoEl = document.getElementById('reset-info');
            const resetButtonEl = document.getElementById('reset-button');
            const chatInputFieldEl = document.getElementById('chat-input-field');
            const messagesContainerEl = document.getElementById('messages-container');
            const chatFormEl = document.getElementById('chat-form');
            const habitTitleEl = document.getElementById('habit-title');
            const logoutButton = document.getElementById('logout-button');

            // --- RENDER FUNCTIONS ---
            function updateUI() {
                if (!state.currentUser) return;

                // ✅ FIXED: state.currentUser is already a flat object with rankData inside
                const profile = state.currentUser;
                const rankData = profile.rankData;
                
                if (!rankData) {
                    console.error('❌ rankData not found in state.currentUser');
                    return;
                }
                
                // Header
                welcomeUsernameEl.textContent = `${rankData.name} ${profile.last_name}`;
                userAvatarEl.src = profile.avatar_url || 'https://c.animaapp.com/wYjpt5p0/img/profile-photo-5@2x.png';
                statusRankIconEl.src = rankData.icon;
                habitTitleEl.textContent = profile.habit || 'Undefined';
                
// Progress Bar
		                // ⚠️ FIX: Ensure retention_days is calculated if it is 0 or null, using the user's creation date (onboarding_data)
		                let currentRetentionDays = profile.retention_days || 0;
		                
		                // If retention_days is 0, calculate the days since onboarding to ensure the counter starts counting
                if (currentRetentionDays === 0 && profile.onboarding_data) {
                    const onboardingDate = new Date(profile.onboarding_data);
                    const today = new Date();
                    // Ignore time and timezone
                    onboardingDate.setUTCHours(0, 0, 0, 0);
                    today.setUTCHours(0, 0, 0, 0);

                    const diffTime = Math.abs(today - onboardingDate);
                    currentRetentionDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                }

                const nextRank = state.channels.find(r => r.level === rankData.level + 1);
                const daysForNextRank = nextRank ? nextRank.minDays : rankData.maxDays;

                progressDaysEl.innerHTML = `${currentRetentionDays}<span>/${daysForNextRank} Days</span>`;

                const progressPercentage = Math.min((currentRetentionDays / daysForNextRank) * 100, 100);
                progressBarFillEl.style.width = `${progressPercentage}%`;

                // Ranks List
                renderRanksList(rankData.level);

                // Reset Area
                updateResetArea(profile.last_habit_date, profile.retention_days);
            }

            function renderRanksList(currentRankLevel) {
                ranksListEl.innerHTML = ''; // Clear list
                state.channels.forEach(rank => {
                    const li = document.createElement('li');
                    li.className = 'rank-item';
                    if (rank.level === currentRankLevel) {
                        li.classList.add('active');
                    }
                    li.innerHTML = `
                        <img src="${rank.icon}" alt="${rank.name}">
                        <span>${rank.name}</span>
                        <span class="days-range">${rank.minDays} - ${rank.maxDays === Infinity ? '∞' : rank.maxDays} days</span>
                    `;
                    ranksListEl.appendChild(li);
                });
            }

            function updateResetArea(lastHabitDateStr, retentionDays) {
                if (!lastHabitDateStr) {
                    resetInfoEl.innerHTML = 'No resets yet';
                    resetButtonEl.disabled = true;
                    return;
                }

                const lastHabitDate = new Date(lastHabitDateStr);
                const today = new Date();
                const diffTime = Math.abs(today - lastHabitDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                const chances = Math.floor(retentionDays / 10); // 1 chance every 10 days
                resetInfoEl.innerHTML = `Reset chances <span>${chances}</span>`;

                if (chances > 0) {
                    resetButtonEl.disabled = false;
                    resetButtonEl.onclick = handleReset;
                } else {
                    resetButtonEl.disabled = true;
                }
            }

            function renderMessage(message) {
                const isCurrentUser = message.user_id === state.currentUser.id;
                const user = state.allUsers.find(u => u.id === message.user_id);
                const userName = user ? `${user.rankData.name} ${user.last_name}` : 'Loading...';
                const userAvatar = user ? user.avatar_url : 'assets/styles/images/profile-card.png';

                const messageEl = document.createElement('div');
                messageEl.className = `message ${isCurrentUser ? 'sent' : 'received'}`;

                const avatarImg = `<img src="${userAvatar}" alt="Avatar" class="avatar">`;
                const messageContent = `
                    <div class="message-content">
                        <div class="username">${userName}</div>
                        <div class="text">${message.content}</div>
                        <div class="timestamp">${new Date(message.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                `;

                messageEl.innerHTML = isCurrentUser ? messageContent + avatarImg : avatarImg + messageContent;
                messagesContainerEl.appendChild(messageEl);
            }

            // --- EVENT HANDLERS ---
            async function handleReset() {
                if (confirm('Are you sure you want to reset your count? This action cannot be undone.')) {
                    try {
                        await UserService.resetUserProgress(state.currentUser.id);
                        showToast('Your progress has been reset.');
                        // Reload data to reflect the changes
                        await loadInitialData();
                    } catch (error) {
                        console.error('Error resetting progress:', error);
                        showToast('Error resetting progress. Try again later.', 'error');
                    }
                }
            }

            async function handleSendMessage(event) {
                event.preventDefault();
                const content = chatInputFieldEl.value.trim();
                if (content && state.activeChannel) {
                    try {
                        await ChatService.sendMessage(state.activeChannel, content);
                        chatInputFieldEl.value = '';
                        // The message will be received via the real-time subscription
                    } catch (error) {
                        console.error('Error sending message:', error);
                        showToast('Error sending message.', 'error');
                    }
                }
            }

            // --- INITIALIZATION ---
            async function loadInitialData() {
                try {
                    const user = await AuthService.getCurrentUser();
                    if (!user) {
                        window.location.href = 'index.html';
                        return;
                    }

                    const profile = await UserService.getUserProfile(user.id);
                    if (!profile) {
                        console.error("Profile not found for user:", user.id);
                        // Maybe redirect to a profile creation page
                        return;
                    }

                    const rankData = UserService.getRankData(profile.retention_days, state.channels);
                    state.currentUser = { ...profile, rankData };
                    state.activeChannel = rankData.id; // Channel corresponds to the user's rank

                    // Fetch all users for the chat
                    const allProfiles = await UserService.getAllUsers();
                    state.allUsers = allProfiles.map(p => ({ 
                        ...p, 
                        rankData: UserService.getRankData(p.retention_days, state.channels)
                    }));

                    updateUI();

                    // Load chat messages
                    const messages = await ChatService.getMessages(state.activeChannel);
                    messagesContainerEl.innerHTML = ''; // Clear previous messages
                    messages.forEach(renderMessage);
                    messagesContainerEl.scrollTop = messagesContainerEl.scrollHeight; // Scroll to bottom

                    // Set up real-time subscription for new messages
                    ChatService.subscribeToChannel(state.activeChannel, (newMessage) => {
                        renderMessage(newMessage);
                        messagesContainerEl.scrollTop = messagesContainerEl.scrollHeight;
                    });

                } catch (error) {
                    console.error("Initialization Error: ", error);
                    // Handle error, maybe show a message to the user
                }
            }

            // --- EVENT LISTENERS ---
            logoutButton.addEventListener('click', async () => {
                await AuthService.logout();
                window.location.href = 'index.html';
            });

            chatFormEl.addEventListener('submit', handleSendMessage);

            // --- START ---
            loadInitialData();
        });
    </script>
</body>
</html>
