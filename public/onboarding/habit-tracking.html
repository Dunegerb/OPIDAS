<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding: Tracking - OPIDAS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/habit-tracking.css">
</head>
<body>
    <header class="page-header">
        <!-- Corrected: Header Logo -->
        <img alt="OPIDAS Brand Logos" src="/assets/styles/images/logoopidas+campo.svg" />
    </header>


    <div class="onboarding-card">
        <!-- Corrected: Left Background -->
        <img class="background-image-left" alt="" src="/assets/styles/images/backgroundcardsecin.png" />
        
        <main class="main-content">
            <!-- Identity Card Section (Fixed Preview) -->
            <section class="identity-card-section" aria-label="Identity Card Preview">
                <div class="card-base"></div>
                <!-- Corrected: Card Texture -->
                <img class="card-texture" alt="" src="/assets/styles/images/texturecard.png" />
                <!-- Corrected: Card Logo Overlay -->
                <img class="card-logo-overlay" alt="Opidas logo" src="/assets/styles/images/logomarkcard.png" />
                <div class="card-background-mark">
                    <!-- Corrected: Card Watermark -->
                    <img alt="" src="/assets/styles/images/mark-card.png" />
                </div>
                <!-- Corrected: Top Vector 1 -->
                <img class="card-vector-top1" alt="" src="/assets/styles/images/vectorcardtop1.svg" />
                <!-- Corrected: Top Vector 2 / Identity Background -->
                <img class="card-vector-top2" alt="" src="/assets/styles/images/identidadedocampobackground.png" />
                
                <h1 class="card-title">BATTLEFIELD IDENTITY</h1>
                
                <!-- Corrected: Top Right Logo -->
                <img class="card-logo-top-right" alt="" src="/assets/styles/images/logosopidas+campo-card.png" />
                
                <!-- Corrected: Profile Photo (External link removed, will be filled by JS) -->
                <img id="cardProfilePhoto" class="card-profile-photo" alt="Profile photo" src="" />
                
                <div class="card-field contra"><span class="label">Against:</span><span id="cardContra" class="value"></span></div><div class="card-field signature"><span class="label">Signature:</span><span id="cardSignature" class="value"></span></div><h2 class="card-data-heading">DATA:</h2><div class="card-field registration"><span class="label">Registration No.:</span><span id="cardRegistration" class="value"></span></div><div class="card-field warrior-name"><span class="label">Warrior's Name:</span><span id="cardWarriorName" class="value"></span></div><div class="card-field rank"><span class="label">Rank:</span><span id="cardRank" class="value"></span></div><div class="card-field enlistment"><span class="label">Enlistment Date:</span><span class="value"><span id="cardDay" class="date-part">--</span> /<span id="cardMonth" class="date-part">---</span> /<span id="cardYear" class="date-part">----</span></span></div>
            </section>


            <!-- Container for the Form Step -->
            <div class="form-steps-container">
                <section class="form-step habit-tracking-section">
                    <div class="opidas-logo">
                        <!-- Corrected: Form Mini Logo -->
                        <img alt="OPIDAS logo" src="/assets/styles/images/opidaslogomini.png" />
                        <span>OPIDAS</span>
                    </div>
                    <h1 class="form-title">Last time you committed the habit</h1>
                    <p class="form-subtitle">Set on the calendar the last time you practiced the habit of <span id="selectedHabitText" class="highlight"></span>. This step will calculate your rank.</p>
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <button id="prevMonthBtn" class="calendar-nav" aria-label="Previous month">
                                <!-- Corrected: Left Arrow -->
                                <img src="/assets/styles/images/setaesquerdacalendar.svg" alt="Left arrow">
                            </button>
                            <span id="currentMonthYear"></span>
                            <button id="nextMonthBtn" class="calendar-nav" aria-label="Next month">
                                <!-- Corrected: Right Arrow -->
                                <img src="/assets/styles/images/setadireitacalendar.svg" alt="Right arrow">
                            </button>
                        </div>
                        <div class="calendar-body"><div class="calendar-weekdays"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div><div id="calendarGrid" class="calendar-grid"></div></div>
                    </div>
                    <div class="form-actions">
                        <button id="btnGoToNextStep" class="btn btn-primary" type="button">
                            <span>Finish</span>
                            <!-- Corrected: Button Decorative Element -->
                            <img alt="" src="/assets/styles/images/decorative-element-button.png" />
                        </button>
                        <button id="btnGoToPrevStep" class="btn btn-secondary" type="button">Back</button>
                    </div>
                </section>
            </div>
        </main>
    </div>


    <!-- Supabase Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/lib/supabase-config.js"></script>
    <script src="../js/services/user.js"></script>
    <script src="../js/services/stripe.js"></script>


    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // --- State and Constants ---
            const ranks = [ 
                { name: "recruit", minDays: 0, maxDays: 9 },  // ✅ CORRECTED: lowercase
                { name: "soldier", minDays: 10, maxDays: 29 },  // ✅ CORRECTED: lowercase
                { name: "corporal", minDays: 30, maxDays: 59 },  // ✅ CORRECTED: lowercase
                { name: "sergeant", minDays: 60, maxDays: 89 },  // ✅ CORRECTED: lowercase
                { name: "marshal", minDays: 90, maxDays: 179 },  // ✅ CORRECTED: lowercase
                { name: "lieutenant", minDays: 180, maxDays: 364 },  // ✅ CORRECTED: lowercase
                { name: "captain", minDays: 365, maxDays: Infinity },  // ✅ CORRECTED: lowercase (no accent)
            ];
            const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            const monthNamesFull = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            const habits = [
                { id: "masturbation", label: "Masturbation" },
                { id: "pornography", label: "Pornography" },
                { id: "smoking", label: "Smoking" },
                { id: "alcoholic_beverages", label: "Alcoholic Beverages" },
                { id: "other", label: "Other" }
            ];
            
            let userData = {};
            let calendarDate = new Date();


            // ✅ NEW: Checks if it came from Stripe and waits for confirmation
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');

            if (sessionId) {
                console.log('💳 Stripe return detected. Session ID:', sessionId);
                
                // Shows loading message
                const loadingOverlay = document.createElement('div');
                loadingOverlay.id = 'payment-loading';
                loadingOverlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.8);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 10000;
                `;
                loadingOverlay.innerHTML = `
                    <div style="background: white; padding: 40px; border-radius: 16px; text-align: center; max-width: 400px;">
                        <div style="width: 60px; height: 60px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                        <h2 style="margin: 0 0 10px 0; color: #333;">Confirming Payment</h2>
                        <p style="margin: 0; color: #666;">Please wait while we process your subscription...</p>
                    </div>
                    <style>
                        @keyframes spin {
                            0% { transform: rotate(0deg); }
                            100% { transform: rotate(360deg); }
                        }
                    </style>
                `;
                document.body.appendChild(loadingOverlay);

                // Waits for subscription confirmation
                try {
                    const { data: { user } } = await window.supabase.auth.getUser();
                    if (user) {
                        await window.StripeService.waitForSubscriptionActivation(user.id);
                        console.log('✅ Subscription confirmed successfully');
                    }
                } catch (error) {
                    console.error('⚠️ Error verifying subscription:', error);
                } finally {
                    // Removes loading overlay
                    if (loadingOverlay.parentElement) {
                        loadingOverlay.remove();
                    }
                }
            }


            // --- DOM Selectors ---
            const cardWarriorName = document.getElementById('cardWarriorName');
            const cardContra = document.getElementById('cardContra');
            const cardProfilePhoto = document.getElementById('cardProfilePhoto');
            const cardRegistration = document.getElementById('cardRegistration');
            const cardRank = document.getElementById('cardRank');
            const cardSignature = document.getElementById('cardSignature');
            const cardDay = document.getElementById('cardDay');
            const cardMonth = document.getElementById('cardMonth');
            const cardYear = document.getElementById('cardYear');
            const calendarGrid = document.getElementById('calendarGrid');
            const currentMonthYearEl = document.getElementById('currentMonthYear');
            const prevMonthBtn = document.getElementById('prevMonthBtn');
            const nextMonthBtn = document.getElementById('nextMonthBtn');
            const btnGoToNextStep = document.getElementById('btnGoToNextStep');
            const btnGoToPrevStep = document.getElementById('btnGoToPrevStep');


            // --- Functions ---
            
            // ✅ FUNCTION 1: Save state to localStorage
            const saveState = () => {
                localStorage.setItem('onboardingData', JSON.stringify(userData));
                console.log('💾 State saved to localStorage');
            };

            // ✅ FUNCTION 2: Populate the identity card with user data
            const populateCard = () => {
                console.log('🎨 Populating identity card...');
                
                // Populate first and last name
                cardWarriorName.textContent = `${userData.firstName} ${userData.lastName}`.toUpperCase().trim();
                cardSignature.textContent = userData.lastName.toUpperCase().trim();
                
                // Populate habit (against)
                cardContra.textContent = userData.habit ? userData.habit.label.toUpperCase() : '';
                
                // Populate profile photo
                if (userData.profilePhotoUrl) {
                    cardProfilePhoto.src = userData.profilePhotoUrl;
                }
                
                // Populate enlistment date
                const enlistDate = new Date(userData.enlistmentDate);
                cardDay.textContent = enlistDate.getDate().toString().padStart(2, '0');
                cardMonth.textContent = monthNames[enlistDate.getMonth()];
                cardYear.textContent = enlistDate.getFullYear();
                
                // Populate rank (will be updated by calculateAndUpdateRank)
                cardRank.textContent = userData.rank ? userData.rank.toUpperCase() : 'UNDEFINED';
                
                // Populate registration number (if available)
                if (userData.registrationNumber) {
                    cardRegistration.textContent = userData.registrationNumber;
                }
                
                console.log('✅ Card populated successfully');
            };

            // ✅ FUNCTION 3: Calculate rank and retention days
            const calculateAndUpdateRank = () => {
                console.log('📊 Calculating rank...');
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const lastDate = new Date(userData.lastHabitDate);
                lastDate.setHours(0, 0, 0, 0);
                
                // Calculate difference in days
                const diffTime = today - lastDate;
                const retentionDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                userData.retentionDays = retentionDays;
                
                // Find the corresponding rank
                const currentRank = ranks.slice().reverse().find(p => retentionDays >= p.minDays);
                if (currentRank) {
                    userData.rank = currentRank.name; // ✅ Already in lowercase
                    cardRank.textContent = currentRank.name.toUpperCase(); // ✅ Display in uppercase on the card
                }
                
                console.log(`✅ Rank calculated: ${userData.rank} (${retentionDays} days)`);
            };

            // ✅ FUNCTION 4: Load state from localStorage or Supabase
            const loadState = async () => {
                console.log('🔍 Loading onboarding data...');
                
                // Try to load from localStorage first
                const savedData = localStorage.getItem('onboardingData');
                if (savedData) {
                    console.log('✅ Data found in localStorage');
                    userData = JSON.parse(savedData);
                    userData.lastHabitDate = userData.lastHabitDate ? new Date(userData.lastHabitDate) : new Date();
                    return true;
                }
                
                // If not in localStorage, fetch from Supabase
                console.log('📡 Fetching data from Supabase...');
                try {
                    const { data: { user }, error: authError } = await window.supabase.auth.getUser();
                    
                    if (authError || !user) {
                        console.error('❌ User not authenticated');
                        alert('Session expired. Please log in again.');
                        window.location.href = '../index.html';
                        return false;
                    }
                    
                    console.log('👤 User authenticated:', user.email);
                    
                    const { data: profile, error: profileError } = await window.supabase
                        .from('profiles')
                        .select('*')
                        .eq('id', user.id)
                        .single();
                    
                    if (profileError) {
                        console.error('❌ Error fetching profile:', profileError);
                        return false;
                    }
                    
                    console.log('✅ Profile data retrieved:', profile);
                    
                    // ✅ CORRECTION: Fetch habit correctly from the database
                    userData = {
                        firstName: profile.first_name || '',
                        lastName: profile.last_name || '',
                        profilePhotoUrl: profile.avatar_url || null,
                        habit: profile.habit ? habits.find(h => h.id === profile.habit) : null,  // ✅ CORRECTED
                        enlistmentDate: profile.created_at || new Date().toISOString(),
                        lastHabitDate: profile.last_habit_date ? new Date(profile.last_habit_date) : new Date(),
                        registrationNumber: profile.registration_number || 'M0RSI-00000000',
                        rank: profile.rank ? profile.rank.toLowerCase() : 'recruit',  // ✅ CORRECTED: normalize to lowercase
                        retentionDays: profile.retention_days || 0
                    };
                    
                    // Save to localStorage for later use
                    saveState();
                    
                    return true;
                } catch (error) {
                    console.error('❌ Error loading data:', error);
                    return false;
                }
            };

            // ✅ FUNCTION 5: Render calendar
            const renderCalendar = () => {
                const year = calendarDate.getFullYear();
                const month = calendarDate.getMonth();
                
                currentMonthYearEl.textContent = `${monthNamesFull[month]} ${year}`;
                
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                
                let dayOfWeek = firstDay.getDay();
                dayOfWeek = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
                
                calendarGrid.innerHTML = '';
                
                for (let i = 0; i < dayOfWeek; i++) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.classList.add('calendar-day', 'empty');
                    calendarGrid.appendChild(emptyDiv);
                }
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayDiv = document.createElement('div');
                    dayDiv.classList.add('calendar-day');
                    dayDiv.textContent = day;
                    
                    const currentDate = new Date(year, month, day);
                    currentDate.setHours(0, 0, 0, 0);
                    
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    
                    if (currentDate > today) {
                        dayDiv.classList.add('disabled');
                    } else {
                        const lastHabitDateNormalized = new Date(userData.lastHabitDate);
                        lastHabitDateNormalized.setHours(0, 0, 0, 0);
                        
                        if (currentDate.getTime() === lastHabitDateNormalized.getTime()) {
                            dayDiv.classList.add('selected');
                        }
                        
                        dayDiv.addEventListener('click', () => {
                            document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
                            dayDiv.classList.add('selected');
                            userData.lastHabitDate = new Date(year, month, day);
                            calculateAndUpdateRank();
                            saveState();
                        });
                    }
                    
                    calendarGrid.appendChild(dayDiv);
                }
            };

            // --- Initialization ---
            const init = async () => {
                const loaded = await loadState();
                
                if (!loaded || !userData.firstName) {
                    alert('Onboarding data not found. Redirecting...');
                    window.location.href = 'identification.html';
                    return;
                }
                
                // Populate the card
                populateCard();
                
                // Calculate initial rank
                calculateAndUpdateRank();
                
                // Render calendar
                renderCalendar();
                
                // Populate selected habit text
                if (userData.habit) {
                    selectedHabitText.textContent = userData.habit.label;
                }
            };

            init();

            // --- Event Listeners ---
            
            // Calendar navigation
            prevMonthBtn.addEventListener('click', () => {
                calendarDate.setMonth(calendarDate.getMonth() - 1);
                renderCalendar();
            });

            nextMonthBtn.addEventListener('click', () => {
                const today = new Date();
                const nextMonth = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 1);
                
                if (nextMonth <= today) {
                    calendarDate.setMonth(calendarDate.getMonth() + 1);
                    renderCalendar();
                }
            });

            // "Back" button
            btnGoToPrevStep.addEventListener('click', () => {
                window.location.href = 'investment.html';
            });

            // "Finish" button
            btnGoToNextStep.addEventListener('click', async () => {
                if (!userData.lastHabitDate) {
                    alert('Please select a date on the calendar.');
                    return;
                }
                
                try {
                    console.log('📝 Saving Step 3 data...');
                    console.log('📊 Rank:', userData.rank);
                    console.log('📅 Retention days:', userData.retentionDays);
                    
                    // Save to localStorage
                    saveState();
                    
                    // ✅ CORRECTED: Save to Supabase with rank in lowercase
                    await window.UserService.updateUserProfile({
                        last_habit_date: userData.lastHabitDate.toISOString(),
                        rank: userData.rank.toLowerCase(),  // ✅ ENSURE lowercase
                        retention_days: userData.retentionDays
                    });
                    
                    console.log('✅ Step 3 data saved successfully');
                    window.location.href = 'welcome.html';
                    
                } catch (error) {
                    console.error('❌ Error saving data:', error);
                    alert('Error saving data. Please try again.');
                }
            });
        });
    </script>
</body>
</html>
