<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding: Identification - OPIDAS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/identification.css">
</head>
<body>
    <header class="page-header">
        <img alt="OPIDAS Brand Logos" src="/assets/styles/images/logoopidas+campo.svg">
    </header>

    <div class="onboarding-card">
        <img class="background-image-left" alt="" src="/assets/styles/images/backgroundcardsecin.png">
        
        <main class="main-content">
            <!-- Identity Card Preview Section (Fixed) -->
            <section class="identity-card-section" aria-label="Identity Card Preview">
                <div class="card-base"></div><img class="card-texture" alt="" src="/assets/styles/images/texturecard.png"><img class="card-logo-overlay" alt="Opidas logo" src="/assets/styles/images/logomarkcard.png"><div class="card-background-mark"><img alt="" src="/assets/styles/images/mark-card.png"></div><img class="card-vector-top1" alt="" src="/assets/styles/images/vectorcardtop1.svg"><img class="card-vector-top2" alt="" src="/assets/styles/images/identidadedocampobackground.png"><h1 class="card-title">BATTLEFIELD IDENTITY</h1><img class="card-logo-top-right" alt="" src="/assets/styles/images/logosopidas+campo-card.png"><img id="cardProfilePhoto" class="card-profile-photo" alt="Profile photo" src="/assets/styles/images/profile-card.png"><div class="card-field contra"><span class="label">Against:</span><span id="cardContra" class="value">PORNOGRAPHY</span></div><div class="card-field signature"><span class="label">Signature:</span><span id="cardSignature" class="value"></span></div><h2 class="card-data-heading">DATA:</h2><div class="card-field registration"><span class="label">Registration No.:</span><span id="cardRegistration" class="value">M0RSI-00000000</span></div><div class="card-field warrior-name"><span class="label">Warrior's Name:</span><span id="cardWarriorName" class="value"></span></div><div class="card-field rank"><span class="label">Rank:</span><span id="cardRank" class="value"></span></div><div class="card-field enlistment"><span class="label">Enlistment Date:</span><span class="value"><span id="cardDay" class="date-part">16</span> /<span id="cardMonth" class="date-part">DEC</span> /<span id="cardYear" class="date-part">2025</span></span></div>
            </section>

            <!-- Form Step Container -->
            <div class="form-steps-container">
                <section class="form-step user-identification-section">
                    <div class="opidas-logo"><img alt="OPIDAS logo" src="/assets/styles/images/opidaslogomini.png"><span>OPIDAS</span></div>
                    <h1 class="form-title">Your Identification</h1>
                    <p class="form-subtitle">Enter all your data to create your identification for the battlefield.</p>
                    <div class="form-row"><div class="input-group"><input id="firstNameInput" type="text" placeholder="First Name" class="input-field"></div><div class="input-group"><input id="lastNameInput" type="text" placeholder="Last Name" class="input-field"></div></div>
                    <div class="dropdown-container"><button type="button" id="dropdownButton" class="dropdown-button" aria-haspopup="listbox" aria-expanded="false"><span id="dropdownLabel" class="placeholder">Against the habit</span><img alt="Dropdown arrow" src="/assets/styles/images/arrowdown.svg"></button><ul id="dropdownMenu" class="dropdown-menu" role="listbox"></ul></div>
                    <div class="file-upload-area"><input type="file" id="file-upload" class="hidden-file-input" accept=".png,.jpg,.jpeg,.webp"><label for="file-upload" id="drop-zone" class="drop-zone"><img alt="Upload icon" src="/assets/styles/images/uploadicon.svg"><span class="drop-text">Drag and drop</span><p class="drop-info">(PNG, JPG, WEBP) Max 5MB</p></label><label for="file-upload" class="file-label">Choose the file</label><p id="file-name-display"></p></div>
                    <div class="form-actions"><button id="btnGoToNextStep" class="btn btn-primary"><span>Next</span><img alt="" src="/assets/styles/images/decorative-element-button.png"></button></div>
                </section>
            </div>
        </main>
    </div>

    <!-- Supabase Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/lib/supabase-config.js"></script>
    <script src="../js/services/user.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', ( ) => {
            // --- Page State and Constants ---
            const habits = [ { id: "masturbation", label: "Masturbation" }, { id: "pornography", label: "Pornography" }, { id: "smoking", label: "Smoking" }, { id: "alcoholic_beverages", label: "Alcoholic Beverages" }, { id: "other", label: "Other" }, ];
            const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            let userData = {
                firstName: '',
                lastName: '',
                habit: null,
                profilePhotoUrl: null,
                enlistmentDate: new Date().toISOString()
            };

            // --- DOM Element Selectors ---
            const firstNameInput = document.getElementById('firstNameInput');
            const lastNameInput = document.getElementById('lastNameInput');
            const dropdownButton = document.getElementById('dropdownButton');
            const dropdownLabel = document.getElementById('dropdownLabel');
            const dropdownMenu = document.getElementById('dropdownMenu');
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-upload');
            const fileNameDisplay = document.getElementById('file-name-display');
            const cardWarriorName = document.getElementById('cardWarriorName');
            const cardContra = document.getElementById('cardContra');
            const cardProfilePhoto = document.getElementById('cardProfilePhoto');
            const cardRegistration = document.getElementById('cardRegistration');
            const cardSignature = document.getElementById('cardSignature');
            const cardDay = document.getElementById('cardDay');
            const cardMonth = document.getElementById('cardMonth');
            const cardYear = document.getElementById('cardYear');
            const btnGoToNextStep = document.getElementById('btnGoToNextStep');

            // --- UI Update Functions ---
            const updateCardName = () => {
                userData.firstName = firstNameInput.value.trim();
                userData.lastName = lastNameInput.value.trim();
                cardWarriorName.textContent = `${userData.firstName} ${userData.lastName}`.toUpperCase().trim();
                cardSignature.textContent = userData.lastName.toUpperCase().trim();
            };
            const updateCardContra = () => { cardContra.textContent = userData.habit ? userData.habit.label.toUpperCase() : ''; };
            const updateCardPhoto = (file) => {
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        userData.profilePhotoUrl = e.target.result;
                        cardProfilePhoto.src = userData.profilePhotoUrl;
                    };
                    reader.readAsDataURL(file);
                }
            };
            const setEnlistmentDate = (date) => {
                cardDay.textContent = date.getDate().toString().padStart(2, '0');
                cardMonth.textContent = monthNames[date.getMonth()];
                cardYear.textContent = date.getFullYear();
            };

            // --- Loading and Persistence Logic ---
            const saveState = () => {
                localStorage.setItem('onboardingData', JSON.stringify(userData));
            };

            const loadState = async () => {
                // ⚠️ FIX: Clear localStorage if the user has already completed onboarding
                // or if the session is new to avoid persistent test data.
                const { data: { session } } = await window.supabase.auth.getSession();
                
                if (!session) {
                    // If there is no session, it is a new user, clear any test junk
                    localStorage.removeItem('onboardingData');
                }

                const savedData = localStorage.getItem('onboardingData');
                if (savedData) {
                    const parsedData = JSON.parse(savedData);
                    userData = { ...userData, ...parsedData };
                    
                    firstNameInput.value = userData.firstName || '';
                    lastNameInput.value = userData.lastName || '';
                    if (userData.habit) {
                        // Find the complete habit object to ensure the label is correct
                        const habitObject = habits.find(h => h.id === userData.habit.id);
                        if (habitObject) {
                            userData.habit = habitObject; // Update the complete object
                            dropdownLabel.textContent = habitObject.label;
                            dropdownLabel.classList.remove('placeholder');
                        }
                    }
                    if (userData.profilePhotoUrl) {
                        cardProfilePhoto.src = userData.profilePhotoUrl;
                    }
                    updateCardName();
                    updateCardContra();
                }
            };

            // --- Event Logic ---
            firstNameInput.addEventListener('input', updateCardName);
            lastNameInput.addEventListener('input', updateCardName);
            
            const populateDropdown = () => {
                habits.forEach(habit => {
                    const li = document.createElement('li');
                    li.className = 'dropdown-item';
                    li.setAttribute('role', 'option');
                    li.innerHTML = `<div class="checkbox-custom"><div class="checkbox-inner"></div></div><span>${habit.label}</span>`;
                    
                    if (userData.habit && userData.habit.id === habit.id) {
                        li.querySelector('.checkbox-custom').classList.add('selected');
                    }
                    
                    li.addEventListener('click', () => {
                        userData.habit = habit;
                        dropdownLabel.textContent = habit.label;
                        dropdownLabel.classList.remove('placeholder');
                        document.querySelectorAll('.dropdown-item .checkbox-custom').forEach(el => el.classList.remove('selected'));
                        li.querySelector('.checkbox-custom').classList.add('selected');
                        dropdownMenu.classList.remove('open');
                        dropdownButton.setAttribute('aria-expanded', 'false');
                        updateCardContra();
                    });
                    dropdownMenu.appendChild(li);
                });
            };

            dropdownButton.addEventListener('click', () => {
                dropdownMenu.classList.toggle('open');
                dropdownButton.setAttribute('aria-expanded', dropdownMenu.classList.contains('open'));
            });
            document.addEventListener('click', (e) => {
                if (!dropdownButton.contains(e.target) && !dropdownMenu.contains(e.target)) {
                    dropdownMenu.classList.remove('open');
                    dropdownButton.setAttribute('aria-expanded', 'false');
                }
            });

            const handleFile = (file) => {
                if (file) {
                    if (file.size > 5 * 1024 * 1024) { return alert('The file is too large (Max 5MB).'); }
                    if (!['image/png', 'image/jpeg', 'image/webp'].includes(file.type)) { return alert('Invalid format.'); }
                    fileNameDisplay.textContent = `File: ${file.name}`;
                    updateCardPhoto(file);
                }
            };
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent-color)'; });
            dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = 'var(--border-color)');
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'var(--border-color)';
                if (e.dataTransfer.files.length) {
                    fileInput.files = e.dataTransfer.files;
                    handleFile(e.dataTransfer.files[0]);
                }
            });
            fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));
            
            btnGoToNextStep.addEventListener('click', async () => {
                if (!userData.firstName || !userData.lastName || !userData.habit || !userData.profilePhotoUrl) {
                    alert('Please fill in all fields and upload a photo.');
                    return;
                }
                
                try {
                    console.log('📝 Saving Step 1 data...');
                    
                    // Save to localStorage
                    saveState();
                    
                    // Save to Supabase (using 'habit' according to the database schema)
                    await window.UserService.updateUserProfile({
                        first_name: userData.firstName,
                        last_name: userData.lastName,
                        avatar_url: userData.profilePhotoUrl,
                        habit: userData.habit.id  // ✅ FIXED: use 'habit' instead of 'habit_id'
                    });
                    
                    console.log('✅ Step 1 data saved successfully');
                    window.location.href = 'investment.html';
                    
                } catch (error) {
                    console.error('❌ Error saving data:', error);
                    alert('Error saving data. Try again.');
                }
            });
            
            // --- Initialization ---
            const initialize = async () => {
                await loadState(); // Now it's asynchronous
                cardRegistration.textContent = "M0RSI-00000000";
                populateDropdown();
                setEnlistmentDate(new Date(userData.enlistmentDate));
            };
            initialize();
        });
    </script>
</body>
</html>
