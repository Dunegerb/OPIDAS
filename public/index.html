<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Warrior Field</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/styles/images/icones/flaticon.png" type="image/png">
    <link rel="stylesheet" href="assets/styles/base.css">
    <link rel="stylesheet" href="assets/styles/login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>
    <header class="page-header">
        <img alt="OPIDAS Brand Logos" src="assets/styles/images/logoopidas+campo.svg" />
    </header>

    <div class="login-card">
        <!-- Left Column: Hero Image -->
        <section class="hero-section" aria-label="Hero Image">
            <img class="background-image" alt="Warrior Field Background" src="assets/styles/images/photologin.png" />
            <img class="decorative-element" alt="Decorative Element" src="assets/styles/images/decorative-element.png" />
        </section>

        <!-- Right Column: Login Form -->
        <main class="main-content">
            
            <div class="opidas-header">
                <img alt="OPIDAS Logo" src="assets/styles/images/opidaslogomini.png" />
                <div>OPIDAS</div>
            </div>

            <div class="login-form-wrapper">
                <h1 id="form-title">Welcome to the Warrior Field</h1>
                <p class="subtitle">
                    Welcome to your battlefield. Create your account or log in with your Opida account.
                </p>

                <form id="auth-form">
                    <div class="form-group">
                        <label for="email" class="sr-only">Email</label>
                        <input id="email" type="email" placeholder="Email" required aria-required="true" />
                    </div>
                    <div class="form-group">
                        <label for="password" class="sr-only">Password</label>
                        <input id="password" type="password" placeholder="Password" required aria-required="true" />
                    </div>
                    <button type="submit" class="submit-button" aria-label="Enlist">
                        <span id="submit-button-text">Enlist</span>
                        <img alt="" src="assets/styles/images/decorative-element-button.png" />
                    </button>
                </form>

                <div class="separator">
                    <div class="line"></div>
                    <span>OR</span>
                    <div class="line"></div>
                </div>

                <div class="social-login" role="group" aria-label="Social Login Options">
                    <button data-provider="google" aria-label="Login with Google">
                        <img alt="Google Login" src="assets/styles/images/google-button.svg" />
                    </button>
                    <button data-provider="apple" aria-label="Login with Apple">
                        <img alt="Apple Login" src="assets/styles/images/apple-button.svg" />
                    </button>
                    <button data-provider="discord" aria-label="Login with Discord">
                        <img alt="Discord Login" src="assets/styles/images/discord-button.svg" />
                    </button>
                    <button data-provider="proton" aria-label="Login with ProtonMail">
                        <img alt="Proton Mail" src="assets/styles/images/protonmail-button.svg" />
                    </button>
                </div>

                <div class="toggle-form-section">
                    <span id="toggle-form-text">Already have an account?</span>
                    <a href="#" id="toggle-form-link">
                        <span>Login</span>
                        <img alt="arrow" src="assets/styles/images/arrow.svg" />
                    </a>
                </div>
            </div>

            <footer class="footer">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <p><span>©</span> 2025 OPIDAS</p>
            </footer>
        </main>
    </div>

    <!-- Project Scripts -->
    <script src="/js/lib/logger.js"></script>
    <script src="/js/components/toast.js"></script>
    <script src="js/lib/supabase-config.js"></script>
    <script src="js/services/auth.js"></script>
    <script>
        // Login page initializer
        document.addEventListener('DOMContentLoaded', () => {
            initAuthPage();
        });
    </script>
</body>

</html>
